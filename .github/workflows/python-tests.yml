name: Python Tests

# GitHub Actions workflow for repository smoke/regression checks.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest coverage mypy

      - name: Compile Python files
        shell: cmd
        run: python -B -c "import py_compile; from pathlib import Path; [py_compile.compile(str(p), doraise=True) for p in Path('.').glob('*.py')]"

      - name: Run pytest collection
        shell: cmd
        run: python -m pytest --collect-only -q

      - name: Run regression tests
        shell: cmd
        run: python -m pytest -q

      - name: Check golden images
        shell: cmd
        run: python tests/generate_golden_images.py --check

      - name: Build and verify release zip
        shell: cmd
        run: |
          python build_release_zip.py
          for %%F in (dist\*-release.zip) do python build_release_zip.py --verify "%%F"

      - name: Build source-only zip
        shell: cmd
        run: python build_release_zip.py --source-only
