name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      QT_QPA_PLATFORM: "offscreen"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages for Qt/Pillow
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile Python files
        run: |
          python -m compileall -q .

      - name: Run v1.4.0 release and regression tests
        run: |
          python -m pytest -q \
            tests/test_release_docs_regression.py \
            tests/test_release_bundle_hygiene.py \
            tests/test_release_hygiene_regression.py \
            tests/test_legacy_device_view_compatibility.py \
            tests/test_renderer_api_regression.py \
            tests/test_input_pipeline_regression.py \
            tests/test_conversion_worker_logic.py
