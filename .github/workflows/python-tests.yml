name: Python tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile sources
        shell: pwsh
        run: |
          python -c "from pathlib import Path; import py_compile; files = [Path('build_release_zip.py')] + sorted(Path('.').glob('tategakiXTC*.py')); [py_compile.compile(str(path), doraise=True) for path in files]"

      - name: Run focused regression tests
        shell: pwsh
        run: |
          python -m unittest tests.test_release_docs_regression tests.test_release_hygiene_regression tests.test_conversion_worker_logic -v

      - name: Build and verify release zip
        shell: pwsh
        run: |
          python build_release_zip.py
          $zipName = python -c "from tategakiXTC_release_metadata import RELEASE_ZIP_FILE_NAME; print(RELEASE_ZIP_FILE_NAME)"
          python build_release_zip.py --verify "dist\$zipName"
